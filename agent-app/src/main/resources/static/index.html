<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>校园 AI 助手 — 小C</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
</head>
<body>

    <!-- 背景装饰 -->
    <div class="bg-decorations"></div>

    <div class="app-container">

        <!-- ========== 顶部导航 ========== -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">🎓</div>
                <div class="header-title-group">
                    <h1>校园 AI 助手</h1>
                    <span class="subtitle">小C · 你的校园智能管家</span>
                </div>
            </div>
            <div class="header-right">
                <span class="model-badge">DeepSeek + RAG</span>
                <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">☀️</button>
            </div>
        </header>

        <!-- ========== 聊天主体 ========== -->
        <main class="chat-main">
            <div id="chat-messages" class="chat-messages">

                <!-- 欢迎卡片 -->
                <div class="welcome-card">
                    <span class="welcome-icon">👋</span>
                    <h2>你好！我是小C</h2>
                    <p>你的校园智能管家，随时为你服务 ✨</p>

                    <div class="feature-grid">
                        <div class="feature-item">
                            <span class="feature-icon">📚</span>
                            <span>查询校园资讯</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📍</span>
                            <span>校园地点 &amp; 导航</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📅</span>
                            <span>选课 &amp; 活动信息</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📋</span>
                            <span>办事流程指南</span>
                        </div>
                    </div>

                    <p class="welcome-hint">试试问我下面的问题 👇</p>

                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="askSuggestion('体育选修课选课时间是什么时候？')">🏀 体育选课</button>
                        <button class="suggestion-btn" onclick="askSuggestion('通宵自习室在哪开放？')">📖 自习室</button>
                        <button class="suggestion-btn" onclick="askSuggestion('校园科技文化节有什么活动？')">🎪 文化节</button>
                        <button class="suggestion-btn" onclick="askSuggestion('图书馆端午节开放安排？')">🏛️ 图书馆</button>
                        <button class="suggestion-btn" onclick="askSuggestion('校园超市夏季时间调整')">🛒 超市时间</button>
                    </div>
                </div>
            </div>

            <!-- 加载指示器 -->
            <div id="loading-indicator" class="loading-indicator" style="display: none;">
                <div class="typing-indicator">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="loading-text">小C正在思考...</span>
                </div>
            </div>
        </main>

        <!-- ========== 底部输入 ========== -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <textarea
                    id="message-input"
                    class="message-input"
                    placeholder="输入你的问题，按 Enter 发送..."
                    rows="1"
                    autofocus
                ></textarea>
                <button id="send-button" class="send-button" aria-label="发送消息">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="footer-note">小C · 基于 DeepSeek 大模型 + RAG 检索技术</p>
        </footer>

    </div>

    <!-- Toast 容器 -->
    <div id="toast" class="toast"></div>

    <script src="/js/chat.js"></script>
</body>
</html>
