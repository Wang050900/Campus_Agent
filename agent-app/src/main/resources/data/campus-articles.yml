articles:
  - title: "2025-2026学年第二学期体育选修课选课通知"
    url: "https://www.xxu.edu.cn/sports/2025/1210/c1234a56789/page.htm"
    publishDate: "2026-05-10"
    content: |
      各学院、各位同学：
      2025-2026学年第二学期体育选修课选课工作即将开始，现将有关事项通知如下：
      一、选课时间：2026年5月15日—6月1日
      二、选课方式：登录教务系统(http://jwxt.xxu.edu.cn)，进入"选课中心"
      三、开设课程：
        1. 篮球——南操场（限80人）
        2. 足球——北操场（限60人）
        3. 羽毛球——体育馆（限40人）
        4. 乒乓球——体育馆（限30人）
        5. 游泳——体育馆游泳馆（限20人）
        6. 瑜伽——体育馆舞蹈室（限30人）
        7. 太极拳——南操场（限50人）
      四、注意事项：
        1. 每位同学限选1门体育选修课
        2. 选课结果将在6月5日公布
        3. 如有疑问请联系体育部办公室（体育馆202室）

  - title: "图书馆关于2026年端午节期间开放安排的通知"
    url: "https://www.xxu.edu.cn/lib/2026/0510/c5678d12345/page.htm"
    publishDate: "2026-05-10"
    content: |
      各位读者：
      根据学校《关于2026年端午节放假安排的通知》，图书馆开放时间安排如下：
      一、6月8日（周六）至6月10日（周一）放假调休，共3天
      二、主馆1楼自习室正常开放（24小时）
      三、2-6楼阅览室开放时间调整为8:00-17:00
      四、6月11日（周二）起恢复正常开放
      五、放假期间，电子资源24小时正常访问
      请各位读者相互转告，祝大家端午安康！

  - title: "关于开放通宵自习室的通知"
    url: "https://www.xxu.edu.cn/xsgz/2026/0420/c9101d23456/page.htm"
    publishDate: "2026-04-20"
    content: |
      为满足同学们期末复习的需求，学校决定开放通宵自习室，具体安排如下：
      一、开放时间：即日起至本学期结束，每天22:00至次日6:00
      二、开放地点：图书馆主馆1楼自习室（24小时区）、第三教学楼（逸夫楼）101-105教室
      三、注意事项：
        1. 通宵自习室仅限本校学生使用，需刷校园卡进入
        2. 请保持安静，不得占座
        3. 离开时请带走个人物品，遗失自负
        4. 如遇紧急情况请拨打保卫处电话：8888-110

  - title: "计算机学院关于2026年暑假实训安排的通知"
    url: "https://www.xxu.edu.cn/cs/2026/0425/c2468d34567/page.htm"
    publishDate: "2026-04-25"
    content: |
      计算机学院全体同学：
      根据教学计划安排，现将2026年暑假实训相关事项通知如下：
      一、实训时间：2026年7月1日—7月28日
      二、实训地点：实验楼3楼计算机实验室
      三、实训内容：
        1. 软件开发实战（Java/Python）
        2. 人工智能基础项目
        3. 数据结构与算法强化训练
      四、实训要求：
        1. 2023级、2024级全体学生必须参加
        2. 缺勤超过1/3者不予通过
        3. 实训成绩计入本学期总评
      具体分组安排请关注计算机学院公众号后续通知。

  - title: "校园超市2026年夏季营业时间调整通知"
    url: "https://www.xxu.edu.cn/hqfw/2026/0512/c1357d45678/page.htm"
    publishDate: "2026-05-12"
    content: |
      各位师生：
      自2026年5月15日起，校园超市执行夏季营业时间，具体如下：
      南食堂负一楼店：7:00-23:00
