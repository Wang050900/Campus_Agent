      欢迎大家选购。

  - title: "关于举办2026年校园科技文化节的通知"
    url: "https://www.xxu.edu.cn/tw/2026/0508/c3690d56789/page.htm"
    publishDate: "2026-05-08"
    content: |
      各学院团委、各学生组织：
      为丰富校园文化生活，学校定于2026年5月20日—6月1日举办"创新·融合·未来"校园科技文化节。
      主要活动安排：
      一、开幕式：5月20日上午9:00，南操场
      二、科技展览：5月20日-22日，图书馆一楼大厅
        各学院将展出最新科研成果和创新项目
      三、编程马拉松（Hackathon）：5月25日-26日，实验楼
        优胜者奖金2000元
      四、校园歌手大赛决赛：5月30日19:00，体育馆
      五、闭幕式暨颁奖晚会：6月1日19:00，南操场
      欢迎全校师生踊跃参与！
