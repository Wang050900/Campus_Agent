server.port=8081
spring.application.name=mcp-server

# 大模型配置（用于 embedding 和可能的工具内调用）
spring.ai.openai.api-key=your-deepseek-or-openai-key
spring.ai.openai.base-url=https://api.deepseek.com/v1
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.embedding.options.model=text-embedding-ada-002   # 若有可用 embedding 接口

# 用内存向量存储即可
spring.ai.vectorstore.type=SIMPLE

# H2 数据库
spring.datasource.url=jdbc:h2:mem:campus
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
